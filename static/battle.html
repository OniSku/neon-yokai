<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Yokai - Battle</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #e94560;
            --accent2: #0f3460;
            --neon: #00fff5;
            --neon2: #ff00e4;
            --text: #eee;
            --muted: #888;
            --hp: #e94560;
            --enemy-hp: #ff6b35;
            --energy: #ffd700;
            --block: #00ffff;
            --green: #39ff14;
            --toxic-jade: #39ff14;
            --electric-indigo: #00ffff;
            --neon-red: #ff0000;
            --neon-green: #00ff00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Top Info Bar */
        .top-info {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .turn-info {
            font-size: 0.9rem;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .phase-indicator {
            font-size: 0.75rem;
            color: var(--muted);
        }
        .escape-btn {
            padding: 8px 16px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        /* Main Battle Area - 3 layers */
        .battle-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 56px 0 0;
            position: relative;
        }

        /* Background */
        .battle-bg {
            position: fixed;
            inset: 0;
            background: url('/static/img/market_bg.jpg') center/cover no-repeat;
            z-index: -2;
        }
        .battle-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.62);
        }

        /* Layer 1 - Enemy zone (top) */
        .enemy-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
            gap: 8px;
            min-height: 160px;
        }
        .enemy-info-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .enemy-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 90px;
        }
        .enemy-name-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .enemy-hp-label {
            font-size: 0.75rem;
            color: var(--text);
        }
        .enemy-hp-mini {
            width: 72px;
            height: 5px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .enemy-hp-mini-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .enemy-tokens-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Layer 2 - Player zone (center) */
        .player-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .player-info-block {
            display: flex;
            gap: 16px;
            align-items: center;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(0,255,245,0.2);
            border-radius: 12px;
            padding: 8px 20px;
        }
        .p-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .p-stat .val { font-size: 1rem; font-weight: 700; }
        .p-stat .lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
        .p-stat.hp .val { color: var(--neon); }
        .p-stat.block .val { color: var(--block); }
        .p-stat.energy .val { color: var(--energy); }

        /* Combo counter - inside player zone */
        .combo-row {
            display: flex;
            gap: 8px;
        }

        /* Layer 3 - Hand zone (bottom) */
        .hand-zone {
            background: linear-gradient(0deg, rgba(0,0,0,0.92) 60%, transparent 100%);
            padding: 8px 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            min-height: 140px;
            overflow-x: auto;
        }
        .hand-cards {
            display: flex;
            gap: 8px;
            flex: 1;
            justify-content: center;
            flex-wrap: nowrap;
            overflow-x: auto;
        }

        /* Token Area - kept for compat */
        .token-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Token Circle */
        .token-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--accent2);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        .token-circle.player {
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            background-image: url('/static/img/chef_token.png');
        }
        .token-circle.enemy {
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }
        .token-circle.enemy.gaki {
            background-image: url('/static/img/gaki_token.png');
        }
        .token-circle.enemy.unknown {
            background-image: none;
            background: var(--surface);
        }

        .token-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--surface2);
        }
        .token-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--muted);
        }

        .token-name {
            position: absolute;
            bottom: -28px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .token-name.player { color: var(--neon); }
        .token-name.enemy { color: var(--accent); }

        /* Artifacts row under player token */
        .artifacts-row {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            justify-content: center;
            max-width: 140px;
            flex-wrap: wrap;
        }
        .artifact-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: var(--surface2);
            border: 1px solid var(--accent2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: help;
        }
        .artifact-icon.active {
            border-color: var(--neon);
            box-shadow: 0 0 5px rgba(0, 255, 245, 0.3);
        }
        .artifact-icon.inactive {
            opacity: 0.4;
            filter: grayscale(1);
        }

        /* HP Bar on Token */
        .token-hp-bar {
            position: absolute;
            bottom: 12px;
            width: 100px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .token-hp-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .token-hp-fill.player { background: var(--toxic-jade); }
        .token-hp-fill.enemy { background: var(--accent); }

        /* HP Text */
        .token-hp-text {
            position: absolute;
            top: -25px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .token-hp-text.player { color: var(--neon); }
        .token-hp-text.enemy { color: var(--accent); }

        /* Block Indicator */
        .token-block {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--electric-indigo);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #000;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }

        /* Intent Bubble */
        .intent-bubble {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
        .intent-bubble.attack { border-color: var(--accent); color: var(--accent); }
        .intent-bubble.defend { border-color: var(--block); color: var(--block); }
        .intent-bubble.steal { border-color: var(--energy); color: var(--energy); }
        .intent-icon { font-size: 1rem; }

        /* Shake Animation for Damage */
        .shake {
            animation: shake-anim 0.2s ease-in-out;
        }
        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* HP Bar Transition */
        .token-hp-fill {
            transition: width 0.3s ease;
        }

        /* Bottom Area - Cards & Controls */
        .bottom-area {
            height: 280px;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Energy Bar */
        .energy-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        .energy-icon {
            width: 24px;
            height: 24px;
            background: var(--energy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #000;
        }
        .energy-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--energy);
        }

        /* Card Hand */
        .card-hand {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .battle-card {
            width: 80px;
            height: 110px;
            background: var(--surface);
            border: 2px solid var(--accent2);
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .battle-card:hover {
            transform: translateY(-8px);
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0,255,245,0.3);
        }
        .battle-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .battle-card.disabled:hover {
            transform: none;
            border-color: var(--accent2);
            box-shadow: none;
        }
        .card-cost {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 20px;
            height: 20px;
            background: var(--energy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #000;
        }
        .card-name {
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
            margin-top: 22px;
            line-height: 1.2;
        }
        .card-type {
            font-size: 0.6rem;
            color: var(--muted);
            text-align: center;
            margin-top: 4px;
        }
        .card-power {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* End Turn Button */
        .end-turn-btn {
            align-self: center;
            padding: 12px 40px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        .end-turn-btn:hover {
            box-shadow: 0 0 20px rgba(233,69,96,0.5);
            transform: scale(1.05);
        }

        /* Enemy Intent */
        .enemy-intent {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        /* Combo Counter (5 Flavors) */
        .combo-counter {
            position: fixed;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 50;
        }
        .combo-slot {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            border: 2px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            transition: all 0.3s ease;
        }
        .combo-slot .stack-count {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .combo-slot .flavor-icon {
            font-size: 0.7rem;
        }
        /* HOT - Red */
        .combo-slot.hot { border-color: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.3); }
        .combo-slot.hot .stack-count { color: #ff4444; }
        /* SOUR - Green */
        .combo-slot.sour { border-color: #44ff44; box-shadow: 0 0 10px rgba(68,255,68,0.3); }
        .combo-slot.sour .stack-count { color: #44ff44; }
        /* SWEET - Pink */
        .combo-slot.sweet { border-color: #ff69b4; box-shadow: 0 0 10px rgba(255,105,180,0.3); }
        .combo-slot.sweet .stack-count { color: #ff69b4; }
        /* BITTER - Purple */
        .combo-slot.bitter { border-color: #9944ff; box-shadow: 0 0 10px rgba(153,68,255,0.3); }
        .combo-slot.bitter .stack-count { color: #9944ff; }
        /* SALTY - Blue */
        .combo-slot.salty { border-color: #4444ff; box-shadow: 0 0 10px rgba(68,68,255,0.3); }
        .combo-slot.salty .stack-count { color: #4444ff; }

        /* Card flavor borders */
        .battle-card.hot { border-color: #ff4444; box-shadow: 0 0 15px rgba(255,68,68,0.2); }
        .battle-card.sour { border-color: #44ff44; box-shadow: 0 0 15px rgba(68,255,68,0.2); }
        .battle-card.sweet { border-color: #ff69b4; box-shadow: 0 0 15px rgba(255,105,180,0.2); }
        .battle-card.bitter { border-color: #9944ff; box-shadow: 0 0 15px rgba(153,68,255,0.2); }
        .battle-card.salty { border-color: #4444ff; box-shadow: 0 0 15px rgba(68,68,255,0.2); }

        /* Attack jump animation */
        .attack-jump-down {
            animation: jump-down 0.35s ease-out;
        }
        .attack-jump-up {
            animation: jump-up 0.35s ease-out;
        }
        @keyframes jump-down {
            0%   { transform: translateY(0); }
            40%  { transform: translateY(28px); }
            100% { transform: translateY(0); }
        }
        @keyframes jump-up {
            0%   { transform: translateY(0); }
            40%  { transform: translateY(-28px); }
            100% { transform: translateY(0); }
        }

        /* Buff icons on token */
        .token-buffs {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            justify-content: center;
            max-width: 130px;
            margin-top: 4px;
        }
        .token-buff-icon {
            font-size: 0.6rem;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 4px;
            color: var(--text);
            white-space: nowrap;
        }
        .token-buff-icon.positive { border-color: var(--neon); color: var(--neon); }
        .token-buff-icon.negative { border-color: var(--accent); color: var(--accent); }

        /* Combo toast */
        .combo-toast {
            position: fixed;
            top: 64px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 2px solid var(--neon);
            color: var(--neon);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 0 16px rgba(0,255,245,0.4);
            z-index: 300;
            pointer-events: none;
            animation: toast-in-out 2.5s ease-out forwards;
            text-align: center;
            max-width: 280px;
        }
        @keyframes toast-in-out {
            0%   { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            75%  { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* Victory/Defeat overlay */
        .result-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .result-screen.active { display: flex; }
        .result-title { font-size: 2rem; font-weight: 700; text-shadow: 0 0 30px currentColor; }
        .result-title.win { color: var(--neon); }
        .result-title.lose { color: var(--accent); }
        .result-btn {
            padding: 14px 40px;
            background: var(--surface);
            border: 2px solid var(--neon);
            color: var(--neon);
            font-weight: 700;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="battle-bg"></div>

    <!-- Result Screen -->
    <div class="result-screen" id="result-screen">
        <div class="result-title" id="result-title">ПОБЕДА</div>
        <div id="result-desc" style="color:var(--muted);font-size:0.9rem;text-align:center"></div>
        <button class="result-btn" onclick="returnToHub()">Вернуться в Хаб</button>
    </div>

    <!-- Top Info Bar -->
    <div class="top-info">
        <div>
            <div class="turn-info">ХОД <span id="turn-number">1</span></div>
            <div class="phase-indicator" id="phase-text">Ваша фаза</div>
        </div>
        <button class="escape-btn" onclick="surrender()">Сдаться</button>
    </div>

    <!-- Main Battle Container -->
    <div class="battle-container">

        <!-- LAYER 1: Enemy Zone (top) -->
        <div class="enemy-zone" id="enemy-zone">
            <!-- Инфо-панель врагов -->
            <div class="enemy-info-row" id="enemy-info-row"></div>
            <!-- Жетоны врагов -->
            <div class="enemy-tokens-row" id="enemy-tokens-row"></div>
        </div>

        <!-- LAYER 2: Player Zone (center) -->
        <div class="player-zone">
            <!-- Жетон повара -->
            <div class="token-circle player" id="player-token">
                <div class="token-block" id="player-block" style="display:none">0</div>
            </div>
            <!-- Иконки артефактов под жетоном -->
            <div class="artifacts-row" id="player-artifacts" style="position:static;transform:none;max-width:160px"></div>
            <!-- Баффы игрока -->
            <div class="token-buffs" id="player-buffs"></div>
            <!-- Инфо-блок: HP, Блок, Энергия -->
            <div class="player-info-block">
                <div class="p-stat hp">
                    <span class="val" id="player-hp-text">80/80</span>
                    <span class="lbl">HP</span>
                </div>
                <div class="p-stat block">
                    <span class="val" id="player-block-val">0</span>
                    <span class="lbl">Блок</span>
                </div>
                <div class="p-stat energy">
                    <span class="val" id="energy-text">3/3</span>
                    <span class="lbl">Энергия</span>
                </div>
            </div>
            <!-- Комбо-счётчики -->
            <div class="combo-row">
                <div class="combo-slot hot"><span class="stack-count" id="hot-stacks">0</span><span class="flavor-icon">🌶</span></div>
                <div class="combo-slot sour"><span class="stack-count" id="sour-stacks">0</span><span class="flavor-icon">🍋</span></div>
                <div class="combo-slot sweet"><span class="stack-count" id="sweet-stacks">0</span><span class="flavor-icon">🍯</span></div>
                <div class="combo-slot bitter"><span class="stack-count" id="bitter-stacks">0</span><span class="flavor-icon">☕</span></div>
                <div class="combo-slot salty"><span class="stack-count" id="salty-stacks">0</span><span class="flavor-icon">🧂</span></div>
            </div>
        </div>

        <!-- LAYER 3: Hand Zone (bottom) -->
        <div class="hand-zone">
            <div class="hand-cards" id="card-hand"></div>
            <button class="end-turn-btn" id="end-turn-btn" onclick="endTurn()" style="flex-shrink:0;align-self:center">КОНЕЦ<br>ХОДА</button>
        </div>
    </div>

    <script>
        let battleState = null;

        const ARTIFACT_EMOJI = {
            "Энергетик": "⚡", "Острый соус": "🌶", "Бронежилет шефа": "🦺",
            "Магнитная доска": "🧲", "Точильный камень": "🗡", "Дефибриллятор": "💓",
            "Шипованный фартук": "🦔", "Свинья-копилка": "🐷", "Разбитая копилка": "🐽"
        };
        const POSITIVE_BUFFS = new Set(["RETAIN_BLOCK", "THORNS", "SHARPEN", "SWEET_BUFF", "SPICY_BUFF", "SOUR_BUFF", "BITTER_BUFF", "SALTY_BUFF", "COMBO_BURN", "COMBO_REGEN", "COMBO_THORNS"]);
        const FLAVOR_CLASSES = ["hot", "sour", "sweet", "bitter", "salty"];

        function showComboToast(msg) {
            const t = document.createElement("div");
            t.className = "combo-toast";
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2600);
        }

        function showResultScreen(win, desc) {
            const scr = document.getElementById("result-screen");
            const title = document.getElementById("result-title");
            const d = document.getElementById("result-desc");
            title.className = "result-title " + (win ? "win" : "lose");
            title.textContent = win ? "ПОБЕДА" : "ПОРАЖЕНИЕ";
            d.textContent = desc || "";
            scr.classList.add("active");
        }

        function returnToHub() {
            window.location.href = "/";
        }

        function checkRunFinished(data) {
            if (!data.run) return false;
            if (data.run.run_finished) {
                const won = data.run.battle && data.run.battle.winner === "player";
                showResultScreen(won, won ? "Забег завершен! +100 XP" : "Вы погибли. 50% кредитов сожжено.");
                return true;
            }
            if (data.run.battle && data.run.battle.winner === "enemy") {
                showResultScreen(false, "Вы погибли. 50% кредитов сожжено.");
                return true;
            }
            return false;
        }

        function triggerShake(el) {
            if (!el) return;
            el.classList.add("shake");
            setTimeout(() => el.classList.remove("shake"), 220);
        }

        function triggerAttackJump(el, direction) {
            if (!el) return;
            const cls = direction === "down" ? "attack-jump-down" : "attack-jump-up";
            el.classList.add(cls);
            setTimeout(() => el.classList.remove(cls), 380);
        }

        function renderBuffIcons(buffs, containerId) {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.innerHTML = "";
            if (!buffs || !buffs.length) return;
            for (const b of buffs) {
                const span = document.createElement("span");
                span.className = "token-buff-icon " + (POSITIVE_BUFFS.has(b.tag) ? "positive" : "negative");
                span.textContent = b.tag.replace("_BUFF", "").replace("COMBO_", "") + (b.duration < 99 ? " " + b.duration : "");
                el.appendChild(span);
            }
        }

        function renderEnemies(state) {
            const infoRow = document.getElementById("enemy-info-row");
            const tokensRow = document.getElementById("enemy-tokens-row");
            infoRow.innerHTML = "";
            tokensRow.innerHTML = "";

            const enemies = state.enemies && state.enemies.length ? state.enemies : [];
            if (!enemies.length) return;

            enemies.forEach((es, idx) => {
                const f = es.fighter;
                const alive = es.alive && f.hp > 0;

                // Инфо-карточка
                const card = document.createElement("div");
                card.className = "enemy-card";
                const hpPct = Math.max(0, (f.hp / f.max_hp) * 100);
                let intentStr = "";
                if (es.intent) {
                    if (es.intent.type === "attack") intentStr = "⚔ " + es.intent.value;
                    else if (es.intent.type === "defend") intentStr = "🛡 " + es.intent.value;
                    else intentStr = es.intent.description || "?";
                }
                card.innerHTML =
                    '<div class="enemy-name-label">' + f.name + (alive ? "" : " [МЕРТВ]") + '</div>' +
                    '<div class="enemy-hp-label">' + f.hp + "/" + f.max_hp + (f.block ? " 🛡" + f.block : "") + '</div>' +
                    '<div class="enemy-hp-mini"><div class="enemy-hp-mini-fill" style="width:' + hpPct + '%"></div></div>' +
                    (intentStr ? '<div style="font-size:0.65rem;color:var(--accent);margin-top:2px">' + intentStr + '</div>' : '');
                infoRow.appendChild(card);

                // Жетон
                const tok = document.createElement("div");
                tok.className = "token-circle enemy" + (f.name.includes("Гаки") ? " gaki" : (f.name.includes("Нурарихён") ? "" : " unknown"));
                tok.id = "enemy-token-" + idx;
                tok.style.opacity = alive ? "1" : "0.3";
                tok.style.filter = alive ? "" : "grayscale(1)";
                // Баффы под жетоном
                const buffsDiv = document.createElement("div");
                buffsDiv.className = "token-buffs";
                if (f.buffs && f.buffs.length) {
                    for (const b of f.buffs) {
                        const s = document.createElement("span");
                        s.className = "token-buff-icon " + (POSITIVE_BUFFS.has(b.tag) ? "positive" : "negative");
                        s.textContent = b.tag.replace("_BUFF", "") + (b.duration < 99 ? " " + b.duration : "");
                        buffsDiv.appendChild(s);
                    }
                }
                const wrapper = document.createElement("div");
                wrapper.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:4px";
                wrapper.appendChild(tok);
                wrapper.appendChild(buffsDiv);
                tokensRow.appendChild(wrapper);
            });
        }

        function renderArtifacts(artifacts) {
            const container = document.getElementById("player-artifacts");
            container.innerHTML = "";
            artifacts.forEach(art => {
                const div = document.createElement("div");
                div.className = "artifact-icon " + (art.is_active ? "active" : "inactive");
                div.textContent = ARTIFACT_EMOJI[art.name] || "🔹";
                div.title = art.name + ": " + art.description;
                container.appendChild(div);
            });
        }

        function renderHand(hand, energy) {
            const container = document.getElementById("card-hand");
            container.innerHTML = "";
            hand.forEach((card, index) => {
                const canPlay = card.cost <= energy && card.type !== "curse";
                let flavorClass = "";
                if (card.tags) {
                    const tags = Array.isArray(card.tags) ? card.tags : card.tags.split(",");
                    for (const tag of tags) {
                        const t = tag.trim().toLowerCase();
                        if (FLAVOR_CLASSES.includes(t)) { flavorClass = " " + t; break; }
                    }
                }
                const displayPower = card.is_upgraded ? Math.ceil(card.power * 1.5) : card.power;
                const upgMark = card.is_upgraded ? "+" : "";
                const div = document.createElement("div");
                div.className = "battle-card" + flavorClass + (canPlay ? "" : " disabled");
                div.innerHTML =
                    '<div class="card-cost">' + card.cost + '</div>' +
                    '<div class="card-name">' + card.name + upgMark + '</div>' +
                    '<div class="card-type">' + (card.type === "attack" ? "АТК" : card.type === "skill" ? "НАВ" : "ПРОКЛЯТИЕ") + '</div>' +
                    '<div class="card-power">' + displayPower + '</div>';
                if (canPlay) {
                    div.onclick = () => {
                        triggerAttackJump(document.getElementById("player-token"), "down");
                        playCard(index);
                    };
                }
                container.appendChild(div);
            });
        }

        function renderBattle(state) {
            battleState = state;
            const p = state.player;

            document.getElementById("turn-number").textContent = state.turn;
            document.getElementById("phase-text").textContent = state.phase === "player_turn" ? "Ваша фаза" : "Фаза врага";

            // Игрок
            document.getElementById("player-hp-text").textContent = p.hp + "/" + p.max_hp;
            document.getElementById("player-block-val").textContent = p.block || 0;
            document.getElementById("energy-text").textContent = p.energy + "/" + p.max_energy;
            const pBlockBadge = document.getElementById("player-block");
            if (p.block > 0) { pBlockBadge.textContent = p.block; pBlockBadge.style.display = "flex"; }
            else { pBlockBadge.style.display = "none"; }

            // Баффы игрока
            renderBuffIcons(p.buffs, "player-buffs");

            // Комбо
            if (state.combo_stacks) {
                document.getElementById("hot-stacks").textContent = state.combo_stacks.HOT || 0;
                document.getElementById("sour-stacks").textContent = state.combo_stacks.SOUR || 0;
                document.getElementById("sweet-stacks").textContent = state.combo_stacks.SWEET || 0;
                document.getElementById("bitter-stacks").textContent = state.combo_stacks.BITTER || 0;
                document.getElementById("salty-stacks").textContent = state.combo_stacks.SALTY || 0;
            }

            // Враги
            renderEnemies(state);

            // Артефакты и рука
            renderArtifacts(state.artifacts || []);
            renderHand(state.hand || [], p.energy);
        }

        async function endTurn() {
            const prevHp = battleState ? battleState.player.hp : 80;
            try {
                const res = await fetch("/api/run/action", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "end_turn" })
                });
                const data = await res.json();
                if (checkRunFinished(data)) return;
                if (data.run && data.run.battle) {
                    const newState = data.run.battle;
                    if (newState.player.hp < prevHp) {
                        triggerShake(document.getElementById("player-token"));
                    }
                    battleState = newState;
                    renderBattle(battleState);
                }
            } catch (e) { console.error("Ошибка end_turn:", e); }
        }

        async function surrender() {
            if (confirm("Сдаться и потерять забег?")) {
                try {
                    await fetch("/api/run/action", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "abandon" })
                    });
                    window.location.href = "/";
                } catch (e) { console.error(e); }
            }
        }

        async function playCard(handIndex) {
            try {
                const res = await fetch("/api/run/action", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "play_card", hand_index: handIndex })
                });
                const data = await res.json();
                if (checkRunFinished(data)) return;
                if (data.combo_messages && data.combo_messages.length > 0) {
                    data.combo_messages.forEach((m, i) => setTimeout(() => showComboToast(m), i * 500));
                }
                if (data.run && data.run.battle) {
                    battleState = data.run.battle;
                    renderBattle(battleState);
                    // Shake врага при атаке
                    const firstAlive = document.getElementById("enemy-token-0");
                    triggerShake(firstAlive);
                }
            } catch (e) { console.error("Ошибка play_card:", e); }
        }

        async function initBattle() {
            try {
                const res = await fetch("/api/run/state");
                const data = await res.json();
                if (checkRunFinished(data)) return;
                if (data.run && data.run.battle) {
                    battleState = data.run.battle;
                    renderBattle(battleState);
                }
            } catch (e) { console.error("Ошибка initBattle:", e); }
        }

        initBattle();
    </script>
</body>
</html>
